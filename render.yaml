services:
  - type: web
    name: niche-inbox
    env: python
    repo: https://github.com/Mrun25/Niche-Inbox
    region: ohio
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PORT
        value: 5000
      - key: BASE_URL
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: GMAIL_ADDRESS
        sync: false
      - key: SECRET_KEY
        sync: false
